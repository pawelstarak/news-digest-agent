delivery:
  time: "06:00"
  timezone: "Europe/Warsaw"

categories:
  world_politics:
    display_name: "World Politics"
    frequency: daily
    context_hint: "global politics, international relations, policy decisions, elections, and geopolitical events"
    feeds:
      - url: https://feeds.bbci.co.uk/news/world/rss.xml
        name: BBC World
      - url: https://rss.nytimes.com/services/xml/rss/nyt/World.xml
        name: NYT World
      - url: https://feeds.washingtonpost.com/rss/world
        name: Washington Post World

  science:
    display_name: "Science"
    frequency: daily
    context_hint: "scientific research, discoveries, studies, and advances in physics, biology, medicine, climate science, and technology"
    feeds:
      - url: https://www.sciencedaily.com/rss/all.xml
        name: Science Daily
      - url: https://feeds.nature.com/nature/rss/current
        name: Nature
      - url: https://www.newscientist.com/feed/home/
        name: New Scientist

  nature:
    display_name: "Nature & Environment"
    frequency: daily
    context_hint: "ecology, wildlife, conservation, climate change, environmental policy, and natural world events"
